cvm-version: 0.7.5
cpus: 2
memory: 8192

containers:
  - name: "witness"
    image: "ghcr.io/theforkproject-dev/strata-ebo-turnstile:tinfoil-demo-001@sha256:46bd092e8434610c599285e5ccc24a4c11dae85ce1e07a7b6a7b7213d47fd1b8"
    env:
      - PORT: "8080"
      - HOST: "0.0.0.0"
      - TURNSTILE_DATA_DIR: "/mnt/ramdisk/turnstile"
      - WITNESS_ID: "w1"
      - WITNESS_KEY_ID: "witness:w1:tinfoil"
      - WITNESS_KEY_FILE: "/mnt/ramdisk/turnstile/witness.key.json"
      - WITNESS_WAL: "/mnt/ramdisk/turnstile/witness.wal.jsonl"
    command: ["node", "bin/turnstile-witness.js"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: always

shim:
  upstream-port: 8080
  paths:
    - /health
    - /v1/public-key
    - /v1/sign
